hooks:
  # Run branch-specific commands when the Git provider triggers a DevPanel push hook.
  git_hooks:
    push:
      - branch: "main"
        # Production branch: install without dev dependencies, then rebuild cache.
        cmd: |-
          composer -n install --no-dev
          drush cr
      - branch: "staging"
        # Staging branch mirrors the production install profile.
        cmd: |-
          composer -n install --no-dev
          drush cr
      - branch: "develop"
        # Development keeps dev dependencies available for debugging.
        cmd: |-
          composer -n install
          drush cr
      - branch: "*"
        # Fallback for any other branch.
        cmd: |-
          composer -n install
          drush cr
