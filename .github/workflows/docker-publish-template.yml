name: Docker build and push template

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-application:
    runs-on: ubuntu-latest

    services:
      webserver:
        image: devpanel/php:8.4-base
        env:
          DP_APP_ID: 'open-social'
          APP_ROOT: '/var/www/html'
          WEB_ROOT: '/var/www/html/web'
          CODES_USER_DATA_DIR: '/var/www/html/.vscode'
          CODES_WORKING_DIR: '/var/www/html'
          APACHE_RUN_USER: 'www'
          APACHE_RUN_GROUP: 'www'
          CODES_ENABLE: 'yes'
          DB_HOST: mysql
          DB_PORT: 3306
          DB_ROOT_PASSWORD: root
          DB_NAME: open_social
          DB_USER: user
          DB_PASSWORD: password
          DB_DRIVER: mysql
          SOLR_HOST: solr
          SOLR_PORT: 8983
        ports:
          - 80:80
        volumes:
          - ${{ github.workspace }}:/app/ # Mounting the checked-out code

      mysql:
        image: mysql:8.0
        command: --innodb-buffer-pool-size=64M --innodb-log-file-size=32M --transaction-isolation=REPEATABLE-READ
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: user
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: open_social
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      solr:
        image: solr:8
        ports:
          - 8983:8983
        command: >-
          bash -c "solr-precreate social && solr-foreground"
        options: >-
          --health-cmd="bash -c 'nc -z localhost 8983'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Set up Docker Environment
        uses: docker/setup-buildx-action@v3

      - name: Check out code
        uses: actions/checkout@v4

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            docker exec ${{ job.services.mysql.id }} mysqladmin ping -h localhost -u root --password=root && exit 0
            sleep 5
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Wait for Solr
        run: |
          for i in {1..30}; do
            docker exec ${{ job.services.solr.id }} bash -c "nc -z localhost 8983" && exit 0
            sleep 5
          done
          echo "Solr did not become ready in time"
          exit 1

      - name: Setup Project
        run: |
          echo "PREPARE DIR FOR INSTALL"
          docker exec ${{ job.services.webserver.id }} bash -c "sudo rm -rf \"\$APP_ROOT\" && sudo mkdir -p \"\$APP_ROOT\""
          docker exec ${{ job.services.webserver.id }} bash -c "sudo cp -r /app/. \"\$APP_ROOT\"/."
          docker exec ${{ job.services.webserver.id }} bash -c "sudo chown -R www:www \"\$APP_ROOT\" && chmod +x \"\$APP_ROOT\"/.devpanel/init.sh \"\$APP_ROOT\"/.devpanel/custom_package_installer.sh \"\$APP_ROOT\"/.devpanel/init-container.sh \"\$APP_ROOT\"/.devpanel/create_quickstart.sh \"\$APP_ROOT\"/.devpanel/re-config.sh"
          docker exec ${{ job.services.webserver.id }} bash -c "cd \"\$APP_ROOT\" && rm -rf .git"

          echo "INSTALL CUSTOM PACKAGE"
          docker exec ${{ job.services.webserver.id }} bash -c "cd \"\$APP_ROOT\" && bash .devpanel/custom_package_installer.sh"

          echo "INSTALL DRUPAL"
          docker exec ${{ job.services.webserver.id }} bash -c "cd \"\$APP_ROOT\" && bash .devpanel/init.sh"

          docker exec ${{ job.services.webserver.id }} bash -c "cd \"\$APP_ROOT\" && ls -al"
          docker exec ${{ job.services.webserver.id }} bash -c "cd \"\$APP_ROOT\" && ls -al .devpanel"
          docker exec ${{ job.services.webserver.id }} bash -c "cd \"\$APP_ROOT\" && ls -al web/sites/default"

          echo "DUMPS DATABASE + STATIC FILE"
          docker exec ${{ job.services.webserver.id }} bash -c "cd \"\$APP_ROOT\" && bash .devpanel/create_quickstart.sh"
          docker exec ${{ job.services.webserver.id }} bash -c '
            echo "Cleaning container before commit..."

            # Composer cache
            sudo rm -rf /root/.composer/cache || true
            sudo rm -rf /var/www/.composer/cache || true

            # Apt cache
            apt-get clean || true
            sudo rm -rf /var/lib/apt/lists/* || true

            # Logs
            sudo rm -rf /var/log/* || true

            # Temp
            sudo rm -rf /tmp/* || true

            # Git
            sudo rm -rf /var/www/html/.git || true

            # Node/npm junk if any
            sudo rm -rf /var/www/html/node_modules || true

            # Drupal cache dirs
            sudo rm -rf /var/www/html/web/sites/default/files/php || true
            sudo rm -rf /var/www/html/web/sites/default/files/styles || true

            # Keep only needed dumps
            find /var/www/html/.devpanel/dumps -type f ! -name "*.gz" -delete || true

            echo "Cleanup done."
            '

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set env to testing environment
        run: |
          echo "IMAGE_TAG=vinugawade/open-social:develop" >> $GITHUB_ENV

      - name: Set env to production environment
        if: endsWith(github.ref, '/main')
        run: |
          echo "IMAGE_TAG=vinugawade/open-social:main" >> $GITHUB_ENV

      - name: Commit and push the container state to Docker Hub
        run: |
          docker commit ${{ job.services.webserver.id }} ${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_TAG }}

      - name: Push to tag latest
        if: endsWith(github.ref, '/main')
        run: |
          docker commit ${{ job.services.webserver.id }} vinugawade/open-social:latest
          docker push vinugawade/open-social:latest