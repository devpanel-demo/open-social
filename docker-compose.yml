# Local test file for the published Docker image.
#
# Usage:
# 1. Commit and push your changes so GitHub builds and publishes the image.
# 2. Update the image tag below if needed.
# 3. Run: docker compose up -d
# 4. Check logs until the Drupal container finishes its first-time setup:
#      docker compose logs -f drupal
#
# Notes:
# - This file is only for local image testing.
# - The Drupal container runs the startup init script automatically.
# - First startup can take a few minutes because it waits for DB/Solr and restores/imports data.
# - Open the site only after the drupal logs settle down.

services:
  drupal:
    image: vinugawade/open-social:latest
    platform: linux/x86_64
    ports:
      - "8081:80"
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      solr:
        condition: service_healthy
    environment:
      APP_ROOT: /var/www/html
      WEB_ROOT: /var/www/html/web
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: 1
      DB_NAME: drupal_db
      DB_PORT: "3306"
      DB_DRIVER: mysql
      CODES_ENABLE: "yes"
      CODES_PORT: "8080"
      CODES_WORKING_DIR: /var/www/html
      CODES_AUTH: "no"
      PASSWORD: ""
      APACHE_RUN_USER: www
      APACHE_RUN_GROUP: www
      SOLR_HOST: solr
      SOLR_PORT: 8983

    # For a published/prebuilt image, run the init script on startup.
    # This should prepare the container for local testing, then start Apache.
    command: >
      bash -lc "cd /var/www/html &&
      if [ -f .devpanel/init-container.sh ]; then bash .devpanel/init-container.sh; fi &&
      exec apache2-foreground"