include:
  - base/docker-compose.base.yml

services:
  app:
    image: devpanel/php:8.5-base-rc
    environment:
      DP_APP_ID: 'open-social'
      APP_ROOT: '/var/www/html'
      WEB_ROOT: '/var/www/html/web'
      # Devcontainer-only unzip defaults for virtiofs metadata compatibility.
      UNZIPOPT: '-o -DD'
      CODES_USER_DATA_DIR: '/var/www/html/.vscode'
      CODES_WORKING_DIR: '/var/www/html'
      APACHE_RUN_USER: 'www'
      APACHE_RUN_GROUP: 'www'
      CODES_ENABLE: 'no'
      DB_HOST: db
      DB_PORT: 3306
      DB_ROOT_PASSWORD: root
      DB_NAME: open_social
      DB_USER: user
      DB_PASSWORD: password
      DB_DRIVER: mysql
      SOLR_HOST: solr
      SOLR_PORT: 8983
    volumes:
      - "..:/var/www/html"
    depends_on:
      - db
